spring:
  application:
    name: ai-legal-document-analyzer
  jackson:
    parser:
      allow-unquoted-control-chars: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_legal_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

app:
  api:
    callback-base-url: ${APP_CALLBACK_BASE_URL:http://localhost:8080}
  ai-service:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8000}
  storage:
    upload-root: ${UPLOAD_ROOT:uploads}
  jwt:
    secret: a-very-secure-secret-key-that-should-be-at-least-256-bits-long-for-hmac-sha-256
    access-token-expiration-ms: 900000       # 15 minutes
    refresh-token-expiration-ms: 604800000   # 7 days
    refresh-cookie-name: refreshToken
  payment:
    vnpay:
      pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      return-url: ${VNPAY_RETURN_URL:http://localhost:8080/api/v1/payment-transactions/vnpay-return}
      tmn-code: ${VNPAY_TMN_CODE:CHANGE_ME}
      hash-secret: ${VNPAY_HASH_SECRET:CHANGE_ME}
