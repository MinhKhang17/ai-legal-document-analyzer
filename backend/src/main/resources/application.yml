spring:
  application:
    name: ai-legal-document-analyzer

  config:
    import: "optional:file:.env[.properties]"

  jackson:
    parser:
      allow-unquoted-control-chars: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_legal_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    out-of-order: ${SPRING_FLYWAY_OUT_OF_ORDER:true}
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://ai-legal-document-analyzer-eta.vercel.app}

  api:
    callback-base-url: ${APP_API_CALLBACK_BASE_URL:http://localhost:8080}

  ai-service:
    base-url: ${APP_AI_SERVICE_BASE_URL:http://localhost:8000}
    connect-timeout: ${AI_SERVICE_CONNECT_TIMEOUT:5s}
    read-timeout: ${AI_SERVICE_READ_TIMEOUT:130s}

  storage:
    upload-root: ${APP_STORAGE_UPLOAD_ROOT:uploads}

  knowledge:
    bulk-input-dir: ${KNOWLEDGE_BULK_INPUT_DIR:/app/data/legal-bulk-input}
    bulk-internal-key: ${KNOWLEDGE_BULK_INTERNAL_KEY:}
    bulk-admin-id: ${KNOWLEDGE_BULK_ADMIN_ID:}

  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}

  ticket-attachments:
    max-size-kb: ${TICKET_ATTACHMENT_MAX_SIZE_KB:500}
    max-per-message: ${TICKET_ATTACHMENT_MAX_PER_MESSAGE:5}
    max-per-ticket: ${TICKET_ATTACHMENT_MAX_PER_TICKET:30}
    upload-root: ${TICKET_ATTACHMENT_UPLOAD_ROOT:uploads/ticket_attachments}

  mail:
    enabled: ${MAIL_ENABLED:true}
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
    # Primary SMTP account. Used for every email first. "from" may be left blank
    # (falls back to "username" in code - see EmailServiceImpl#effectiveFrom).
    primary:
      host: ${SMTP_HOST:smtp.gmail.com}
      port: ${SMTP_PORT:587}
      username: ${SMTP_USERNAME:}
      password: ${SMTP_PASSWORD:}
      from: ${MAIL_FROM:}
    # Backup SMTP account. Only used automatically when the primary account
    # fails to send (e.g. rate-limited/flagged as spam). Leave the username
    # blank to disable failover.
    backup:
      host: ${SMTP_BACKUP_HOST:smtp.gmail.com}
      port: ${SMTP_BACKUP_PORT:587}
      username: ${SMTP_BACKUP_USERNAME:}
      password: ${SMTP_BACKUP_PASSWORD:}
      from: ${MAIL_BACKUP_FROM:}

  jwt:
    secret: ${JWT_SECRET:a-very-secure-secret-key-that-should-be-at-least-256-bits-long-for-hmac-sha-256}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
    refresh-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refreshToken}

  payment:
    vnpay:
      pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      return-url: ${VNPAY_RETURN_URL:http://localhost:8080/api/v1/payment-transactions/vnpay-return}

      tmn-code: ${VNPAY_TMN_CODE:}
      hash-secret: ${VNPAY_HASH_SECRET:}

      version: ${VNPAY_VERSION:2.1.0}
      command: ${VNPAY_COMMAND:pay}
      curr-code: ${VNPAY_CURR_CODE:VND}
      order-type: ${VNPAY_ORDER_TYPE:other}
      locale: ${VNPAY_LOCALE:vn}
      debug-log-credentials: ${VNPAY_DEBUG_LOG_CREDENTIALS:false}
