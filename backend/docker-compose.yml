version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_legal_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_legal_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_legal_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_legal_backend
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ai_legal_db
      DB_USERNAME: postgres
      DB_PASSWORD: 12345
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
