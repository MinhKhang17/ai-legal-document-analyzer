services:
  backend:
    image: legal-rag-platform/backend:dev
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/ai_legal_db
      DB_USERNAME: postgres
      DB_PASSWORD: "12345"
      AI_SERVICE_BASE_URL: http://host.docker.internal:8000
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_legal_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_legal_db"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
