services:
  frontend:
    image: legal-rag-platform/frontend:dev
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_AUTH_REGISTER_API: /api/v1/auth/register
        VITE_AUTH_LOGIN_API: /api/v1/auth/login
        VITE_AUTH_REFRESH_API: /api/v1/auth/refresh
        VITE_AUTH_ME_API: /api/v1/auth/me
        VITE_WORKSPACE_CREATE_API: /api/v1/workspaces
        VITE_WORKSPACE_DOCUMENTS_API: /api/v1/workspaces
        VITE_WORKSPACE_LIST_API: /api/v1/workspaces
        VITE_WORKSPACE_DETAIL_API: /api/v1/workspaces
        VITE_SUBSCRIPTION_PLANS_API: /api/v1/subscription-plans
        VITE_CUSTOMER_PLAN_SUBSCRIBE_API: /api/v1/customer-plans/subscribe
        VITE_CUSTOMER_PLAN_ME_API: /api/v1/customer-plans/me
    ports:
      - "5173:80"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

  backend:
    image: legal-rag-platform/backend:dev
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_URL=jdbc:postgresql://postgres:5432/ai_legal_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=12345
      - UPLOAD_ROOT=/app/uploads
      - AI_SERVICE_BASE_URL=http://localhost:8000
      - APP_CALLBACK_BASE_URL=http://backend:8080
    depends_on:
      - postgres
    volumes:
      - shared_uploads:/app/uploads

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ai_legal_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=12345
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  shared_uploads:
