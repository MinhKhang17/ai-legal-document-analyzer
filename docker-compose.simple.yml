services:
  frontend:
    image: legal-rag-platform/frontend:dev
    build:
      context: ./frontend
    ports:
      - "5173:80"
    environment:
      NODE_ENV: development
    depends_on:
      - backend

  backend:
    image: legal-rag-platform/backend:dev
    build:
      context: ./backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ai_legal_db
      APP_STORAGE_UPLOAD_ROOT: /app/uploads
      APP_AI_SERVICE_BASE_URL: http://ai-service:8000
      APP_API_CALLBACK_BASE_URL: http://backend:8080
    depends_on:
      - postgres
      - ai-service
    volumes:
      - shared_uploads:/app/uploads
      - ./data:/app/data

  ai-service:
    image: legal-rag-platform/ai-service:dev
    build:
      context: ./ai-service
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    environment:
      PYTHONUNBUFFERED: 1
      DOCUMENT_IMPORT_DIR: /app/uploads
    volumes:
      - shared_uploads:/app/uploads
      - ./data:/app/data

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_legal_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  shared_uploads: