services:
  frontend:
    image: legal-rag-platform/frontend:dev
    build:
      context: ./frontend
    ports:
      - "5173:80"
    environment:
      NODE_ENV: development
    depends_on:
      - backend

  backend:
    image: legal-rag-platform/backend:dev
    build:
      context: ./backend
    user: "0:0"
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ai_legal_db
      JPA_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_OUT_OF_ORDER: "true"
      APP_STORAGE_UPLOAD_ROOT: /app/uploads
      TICKET_ATTACHMENT_UPLOAD_ROOT: /app/uploads/ticket_attachments
      APP_AI_SERVICE_BASE_URL: http://ai-service:8000
      APP_API_CALLBACK_BASE_URL: http://backend:8080
    depends_on:
      - ai-service
      - postgres
    volumes:
      - shared_uploads:/app/uploads
      - ./data:/app/data

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    env_file:
      - ./backend/.env
    entrypoint: ["/bin/sh", "-c"]
    command: ['exec ngrok http http://backend:8080 --url "$${NGROK_URL}"']
    ports:
      - "4040:4040"
    depends_on:
      - backend

  ai-service:
    image: legal-rag-platform/ai-service:dev
    build:
      context: ./ai-service
    user: "0:0"
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    environment:
      PYTHONUNBUFFERED: 1
      NEO4J_URI: bolt://neo4j:7687
      DOCUMENT_IMPORT_DIR: /app/uploads
      HF_HOME: /root/.cache/huggingface
      TRANSFORMERS_CACHE: /root/.cache/huggingface/transformers
      SENTENCE_TRANSFORMERS_HOME: /root/.cache/sentence-transformers
      TORCH_HOME: /root/.cache/torch
      PADDLEOCR_HOME: /root/.paddleocr
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./ai-service:/app
      - ./data:/app/data
      - shared_uploads:/app/uploads
      - ./data/ai-cache:/root/.cache
      - ./data/paddleocr:/root/.paddleocr

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_legal_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.26-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1;'"]
      interval: 20s
      timeout: 10s
      retries: 10

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  shared_uploads:
