services:
  frontend:
    image: legal-rag-platform/frontend:dev
    build:
      context: ./frontend
      args:
        VITE_APP_NAME: ${VITE_APP_NAME:-LexiGuard AI Legal Suite}
        VITE_DEFAULT_LANGUAGE: ${VITE_DEFAULT_LANGUAGE:-vi}
        VITE_DEFAULT_THEME: ${VITE_DEFAULT_THEME:-system}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_AI_SERVICE_BASE_URL: ${VITE_AI_SERVICE_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:80"
    environment:
      NODE_ENV: development
    depends_on:
      - backend

  backend:
    image: legal-rag-platform/backend:dev
    build:
      context: ./backend
    user: "0:0"
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/ai_legal_db
      DB_USERNAME: postgres
      DB_PASSWORD: 12345
      APP_STORAGE_UPLOAD_ROOT: /app/uploads
      APP_AI_SERVICE_BASE_URL: http://ai-service:8000
      APP_API_CALLBACK_BASE_URL: http://backend:8080
      VNPAY_RETURN_URL: ${NGROK_URL:-http://localhost:8080}/api/v1/payment-transactions/vnpay-return
    depends_on:
      - ai-service
      - postgres
    volumes:
      - shared_uploads:/app/uploads

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    profiles:
      - ngrok
    command:
      - http
      - http://backend:8080
      - --url
      - ${NGROK_URL:-}
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"
    depends_on:
      - backend

  ai-service:
    image: legal-rag-platform/ai-service:dev
    build:
      context: ./ai-service
    user: "0:0"
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    environment:
      PYTHONUNBUFFERED: 1
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      EMBEDDING_MODEL: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      EMBEDDING_MODEL_NAME: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      EMBEDDING_DIMENSION: 384
      EMBEDDING_DIMENSIONS: 384
      DOCUMENT_IMPORT_DIR: /app/uploads
      LLM_PROVIDER: gemini
      GEMINI_MAX_OUTPUT_TOKENS: 4096
      GEMINI_THINKING_BUDGET: 512
      LLM_V2_ENABLED: "false"
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./ai-service:/app
      - shared_uploads:/app/uploads
      - ai_service_models:/root/.cache

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_legal_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.26-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1;'"]
      interval: 20s
      timeout: 10s
      retries: 10

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  shared_uploads:
  ai_service_models:
