services:
  neo4j:
    image: neo4j:5.16.0
    container_name: legal-rag-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_max__size=2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    image: legal-rag-platform/ai-service:dev
    build:
      context: ./ai-service
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=legal-rag-password
      - EMBEDDING_MODEL=sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      - EMBEDDING_DIMENSION=384
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./ai-service:/app
      - ai_service_models:/root/.cache

  backend:
    image: legal-rag-platform/backend:dev
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - ai-service

  frontend:
    image: legal-rag-platform/frontend:dev
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend

volumes:
  neo4j_data:
  neo4j_logs:
  ai_service_models:
