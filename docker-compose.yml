services:
  frontend:
    image: legal-rag-platform/frontend:dev
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_AUTH_REGISTER_API: /api/auth/v1/register
        VITE_AUTH_LOGIN_API: /api/auth/v1/login
    ports:
      - "5173:80"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

  backend:
    image: legal-rag-platform/backend:dev
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_URL=jdbc:postgresql://postgres:5432/ai_legal_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=12345
    depends_on:
      - ai-service
      - postgres

  ai-service:
    image: legal-rag-platform/ai-service:dev
    build:
      context: ./ai-service
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    depends_on:
      - neo4j

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ai_legal_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=12345
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.26-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_server_memory_pagecache_size=512M
      - NEO4J_server_memory_heap_initial__size=512M
      - NEO4J_server_memory_heap_max__size=512M
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  neo4j_data:
