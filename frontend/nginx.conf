server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Vite assets are content-hashed. A missing/stale hash must be a real 404;
  # returning index.html here produces a 200 response with HTML as JavaScript.
  location ^~ /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location ^~ /.well-known/ {
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }
}
